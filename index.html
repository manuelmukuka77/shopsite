<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopSight Zambia</title>
<style>
    :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #f0f2f5; color: #333; }
.header { background: var(--main); color: white; padding: 1rem; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.logo { font-size: 24px; font-weight: bold; }
.search-bar { flex: 1; max-width: 400px; min-width: 200px; }
.search-bar input { width: 100%; padding: 10px; border-radius: 20px; border: none; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.login-box { position: relative; display: flex; align-items: center; gap: 5px; }
.login-box input { padding: 8px 28px 8px 8px; border-radius: 4px; border: none; width: 140px; }
.toggle-pass { position: absolute; right: 55px; background: none; border: none; cursor: pointer; font-size: 13px; padding: 0; }
.icon-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; position: relative; }
.cart-count { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: grid; place-items: center; }
.container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
.categories { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
.cat-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; white-space: nowrap; }
.cat-btn.active { background: var(--main); color: white; border-color: var(--main); }
.admin-panel { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    body.admin-mode.admin-panel { display: block; }
.admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 10px; }
.admin-panel input,.admin-panel select,.admin-panel textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
.admin-panel textarea { grid-column: 1 / -1; resize: vertical; min-height: 60px; }
.products { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; }
.product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.2s; }
.product-card:hover { transform: translateY(-3px); }
.product-img { width: 100%; height: 220px; object-fit: cover; background: #eee; }
.product-info { padding: 15px; }
.product-cat { font-size: 12px; color: var(--blue); margin-bottom: 4px; }
.product-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.product-desc { font-size: 14px; color: #666; margin-bottom: 8px; line-height: 1.4; }
.product-price { color: var(--green); font-weight: bold; font-size: 18px; margin-bottom: 8px; }
.product-stock { font-size: 13px; color: #777; margin-bottom: 10px; }
.btn { width: 100%; padding: 11px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 6px; }
.btn-cart { background: var(--blue); color: white; }
.btn-whatsapp { background: #25D366; color: white; }
.btn-delete { background: var(--red); color: white; display: none; }
.btn-edit { background: #f39c12; color: white; display: none; }
    body.admin-mode.btn-delete, body.admin-mode.btn-edit { display: block; }
.cart-modal { position: fixed; top: 0; right: -400px; width: 380px; height: 100vh; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 200; padding: 20px; overflow-y: auto; }
.cart-modal.open { right: 0; }
.cart-item { display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
.cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
.empty { text-align: center; color: #777; padding: 60px 0; grid-column: 1 / -1; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
.overlay.show { display: block; }
    @media (max-width: 600px) {.header-content { flex-direction: column; }.search-bar { max-width: 100%; }.cart-modal { width: 100%; right: -100%; } }
</style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">ShopSight Zambia</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
            </div>
            <div class="header-actions">
                <div class="login-box">
                    <input type="password" id="passInput" placeholder="Owner Pass">
                    <button class="toggle-pass" onclick="togglePassword()">👁️</button>
                    <button class="icon-btn" id="loginBtn" onclick="ownerLogin()">Login</button>
                </div>
                <button class="icon-btn" onclick="toggleCart()">
                    🛒 Cart <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="admin-panel" id="adminPanel">
            <h2>Admin Panel</h2>
            <div class="admin-grid">
                <input type="text" id="name" placeholder="Product Name">
                <input type="number" id="price" placeholder="Price ZMW">
                <input type="text" id="image" placeholder="Image URL">
                <select id="category">
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home & Living">Home & Living</option>
                </select>
                <input type="number" id="stock" placeholder="Stock Qty" value="10">
                <textarea id="description" placeholder="Product Description - tell customers what it does"></textarea>
            </div>
            <button class="btn btn-cart" onclick="addProduct()">Add Product to Store</button>
        </div>

        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-modal" id="cartModal">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <h3>Total: K<span id="cartTotal">0</span></h3>
        <button class="btn btn-whatsapp" onclick="checkoutCart()">Checkout via WhatsApp</button>
    </div>

<script>
const OWNER_PASS = "zambia123";
const WHATSAPP_NUM = "260978101177";
const CATEGORIES = ["All", "Electronics", "Fashion", "Home & Living"];

let products = JSON.parse(localStorage.getItem('shopsight_products')) || [];
let cart = JSON.parse(localStorage.getItem('shopsight_cart')) || [];
let isAdmin = false;
let currentCategory = "All";
let editingId = null;

renderCategories();
renderProducts();
updateCartCount();

function togglePassword() {
    const passInput = document.getElementById('passInput');
    const toggleBtn = document.querySelector('.toggle-pass');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        toggleBtn.textContent = '🙈';
    } else {
        passInput.type = 'password';
        toggleBtn.textContent = '👁️';
    }
}

function saveProducts() { localStorage.setItem('shopsight_products', JSON.stringify(products)); }
function saveCart() { localStorage.setItem('shopsight_cart', JSON.stringify(cart)); updateCartCount(); }

function renderCategories() {
    document.getElementById('categories').innerHTML = CATEGORIES.map(cat =>
        `<button class="cat-btn ${cat===currentCategory?'active':''}" onclick="setCategory('${cat}')">${cat}</button>`
    ).join('');
}

function setCategory(cat) {
    currentCategory = cat;
    renderCategories();
    filterProducts();
}

function filterProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => {
        const matchCat = currentCategory === "All" || p.category === currentCategory;
        const matchSearch = p.name.toLowerCase().includes(search) || (p.description && p.description.toLowerCase().includes(search));
        return matchCat && matchSearch;
    });
    renderProducts(filtered);
}

function renderProducts(list = products) {
    const container = document.getElementById('products');
    if (list.length === 0) {
        container.innerHTML = '<div class="empty">No products found. Owner can add products after login.</div>';
        return;
    }
    container.innerHTML = list.map(p => `
        <div class="product-card">
            <img src="${p.image}" alt="${p.name}" class="product-img" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
            <div class="product-info">
                <div class="product-cat">${p.category}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-desc">${p.description || 'No description'}</div>
                <div class="product-price">K${p.price}</div>
                <div class="product-stock">Stock: ${p.stock} available</div>
                <button class="btn btn-cart" onclick="addToCart(${p.id})">Add to Cart</button>
                <a href="https://wa.me/${WHATSAPP_NUM}?text=Hi! I want to order: ${encodeURIComponent(p.name)} - K${p.price}" target="_blank">
                    <button class="btn btn-whatsapp">Order via WhatsApp</button>
                </a>
                <button class="btn btn-edit" onclick="editProduct(${p.id})">✏️ Edit</button>
                <button class="btn btn-delete" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
            </div>
        </div>
    `).join('');
}

function ownerLogin() {
    if (isAdmin) return ownerLogout();
    const pass = document.getElementById('passInput').value;
    if (pass === OWNER_PASS) {
        isAdmin = true;
        document.body.classList.add('admin-mode');
        document.getElementById('adminPanel').style.display = 'block'; // BACKUP: Force show with JS
        document.getElementById('loginBtn').textContent = 'Logout';
        document.getElementById('passInput').style.display = 'none';
        document.querySelector('.toggle-pass').style.display = 'none';
    } else { alert('Wrong password'); }
}

function ownerLogout() {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('adminPanel').style.display = 'none'; // BACKUP: Force hide with JS
    document.getElementById('loginBtn').textContent = 'Login';
    document.getElementById('passInput').style.display = 'inline';
    document.querySelector('.toggle-pass').style.display = 'inline';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').type = 'password';
    document.querySelector('.toggle-pass').textContent = '👁️';
}

function addProduct() {
    const name = document.getElementById('name').value.trim();
    const price = document.getElementById('price').value;
    const image = document.getElementById('image').value.trim();
    const category = document.getElementById('category').value;
    const stock = document.getElementById('stock').value;
    const description = document.getElementById('description').value.trim();
    if (!name ||!price ||!image) return alert('Fill name, price, image');

    if (editingId) {
        const i = products.findIndex(p => p.id === editingId);
        products[i] = {...products[i], name, price: Number(price), image, category, stock: Number(stock), description };
        editingId = null;
        document.querySelector('.admin-panel button').textContent = 'Add Product to Store';
    } else {
        products.push({ id: Date.now(), name, price: Number(price), image, category, stock: Number(stock), description });
    }
    saveProducts();
    filterProducts();
    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('image').value = '';
    document.getElementById('stock').value = '10';
    document.getElementById('description').value = '';
}

function editProduct(id) {
    const p = products.find(p => p.id === id);
    document.getElementById('name').value = p.name;
    document.getElementById('price').value = p.price;
    document.getElementById('image').value = p.image;
    document.getElementById('category').value = p.category;
    document.getElementById('stock').value = p.stock;
    document.getElementById('description').value = p.description || '';
    editingId = id;
    document.querySelector('.admin-panel button').textContent = 'Update Product';
    window.scrollTo(0, 0);
}

function deleteProduct(id) {
    if (!isAdmin) return;
    if (confirm('Delete this product permanently?')) {
        products = products.filter(p => p.id!== id);
        saveProducts();
        filterProducts();
    }
}

function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (product.stock < 1) return alert('Out of stock');
    const item = cart.find(i => i.id === id);
    if (item) { item.qty++; } else { cart.push({...product, qty: 1 }); }
    saveCart();
}

function toggleCart() {
    document.getElementById('cartModal').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
    renderCart();
}

function renderCart() {
    const container = document.getElementById('cartItems');
    if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#777">Cart is empty</p>';
        document.getElementById('cartTotal').textContent = '0';
        return;
    }
    let total = 0;
    container.innerHTML = cart.map(item => {
        total += item.price * item.qty;
        return `
        <div class="cart-item">
            <img src="${item.image}" alt="${item.name}">
            <div style="flex:1">
                <div>${item.name}</div>
                <div>K${item.price} x ${item.qty}</div>
            </div>
            <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px">×</button>
        </div>`;
    }).join('');
    document.getElementById('cartTotal').textContent = total;
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id!== id);
    saveCart();
    renderCart();
}

function updateCartCount() {
    document.getElementById('cartCount').textContent = cart.reduce((a,b) => a + b.qty, 0);
}

function checkoutCart() {
    if (cart.length === 0) return alert('Cart empty');
    let msg = 'Hi! I want to order:%0A';
    let total = 0;
    cart.forEach(i => {
        msg += `${i.qty}x ${i.name} - K${i.price * i.qty}%0A`;
        total += i.price * i.qty;
    });
    msg += `%0ATotal: K${total}`;
    window.open(`https://wa.me/${WHATSAPP_NUM}?text=${msg}`, '_blank');
    cart = [];
    saveCart();
    toggleCart();
}
</script>
</body>
</html>
